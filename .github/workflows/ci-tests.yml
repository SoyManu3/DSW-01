name: 01 CI Tests

on:
  push:
    branches:
      - "develop"
  pull_request:
    branches:
      - "develop"
      - "release"
    paths:
      - "frontend/**"
      - "src/**"
      - "pom.xml"
      - ".github/workflows/ci-tests.yml"

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B -Dtest=com.example.empleados.unit.\*Test test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --watch=false --no-progress

      - name: Run Cypress basic test
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm run start -- --host 0.0.0.0 --port 4200
          wait-on: "http://localhost:4200"
          spec: cypress/e2e/login/login-validation-required.cy.ts
