name: CI - Tests Backend y Frontend

on:
  pull_request:
    branches:
      - "release"
    paths:
      - "pom.xml"
      - "src/**"
      - "frontend/**"

permissions:
  contents: read

jobs:
  changes:
    name: Detectar cambios
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.ref == 'develop'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filtrar archivos cambiados
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "pom.xml"
              - "src/**"
            frontend:
              - "frontend/**"

  backend-tests:
    name: Tests backend (Spring Boot)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Ejecutar tests backend
        run: mvn -B test

  frontend-tests:
    name: Tests frontend (Angular)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        run: npm ci

      - name: Ejecutar tests frontend
        run: npm run test -- --watch=false
