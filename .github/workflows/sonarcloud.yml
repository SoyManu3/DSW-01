name: 02-SonarCloud

on:
  pull_request:
    branches:
      - "master"
      - "release"
    types: [opened, reopened, ready_for_review]
    paths:
      - "frontend/**"
      - "src/**"
      - "pom.xml"
      - ".github/workflows/sonarcloud.yml"
      - "sonar-project.properties"

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate SonarCloud organization
        run: |
          if [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "Missing repository variable SONAR_ORGANIZATION"
            exit 1
          fi

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run backend tests with coverage
        run: mvn -B -Dorg.slf4j.simpleLogger.defaultLogLevel=warn "-Dtest=com.example.empleados.unit.*Test" test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=dsw2-practica01
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=src/main/java,frontend/src
            -Dsonar.tests=src/test/java,frontend/src
            -Dsonar.test.inclusions=**/*Test.java,**/*.spec.ts,**/*.test.ts
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/cypress/**,**/*.cy.ts
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.qualitygate.wait=true
