name: 02-SonarCloud

on:
  pull_request:
    branches:
      - "master"
      - "release"
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "frontend/**"
      - "src/**"
      - "pom.xml"
      - ".github/workflows/sonarcloud.yml"
      - "sonar-project.properties"
      - "frontend/sonar-project.properties"

jobs:
  backend-sonarcloud:
    name: Backend SonarCloud Analysis
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate SonarCloud organization
        run: |
          if [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "Missing repository variable SONAR_ORGANIZATION"
            exit 1
          fi

      - name: Run backend tests with coverage
        run: mvn -B -Dorg.slf4j.simpleLogger.defaultLogLevel=warn "-Dtest=com.example.empleados.unit.*Test" test

      - name: SonarCloud Scan Backend
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}

  frontend-sonarcloud:
    name: Frontend SonarCloud Analysis
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate SonarCloud organization
        run: |
          if [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "Missing repository variable SONAR_ORGANIZATION"
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend with coverage
        run: npm test -- --watch=false --coverage --no-progress

      - name: SonarCloud Scan Frontend
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
