name: SonarCloud Analysis

on:
  pull_request:
    branches:
      - "master"
      - "release"
    types: [opened, synchronize, reopened]
    paths:
      - "frontend/**"
      - "src/**"
      - "pom.xml"
      - ".github/workflows/sonarcloud.yml"
      - "sonar-project.properties"

jobs:
  sonarcloud-backend:
    name: SonarCloud Backend Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-backend
          restore-keys: ${{ runner.os }}-sonar-backend

      - name: Run backend tests
        run: mvn -B -Dorg.slf4j.simpleLogger.defaultLogLevel=warn "-Dtest=com.example.empleados.unit.*Test" test

      - name: Generate SonarCloud backend report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B \
            -Dsonar.projectKey=dsw2-practica01-backend \
            -Dsonar.organization=tu-organizacion \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
        if: env.SONAR_TOKEN != ''

  sonarcloud-frontend:
    name: SonarCloud Frontend Analysis
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm test -- --watch=false --coverage --no-progress || true

      - name: Verify coverage directory
        run: |
          if [ ! -d "coverage" ]; then
            mkdir -p coverage
            echo "coverage/" > .gitkeep
          fi

      - name: SonarCloud Scan Frontend
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=dsw2-practica01-frontend
            -Dsonar.organization=tu-organizacion
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/*.spec.ts
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        if: env.SONAR_TOKEN != ''
