# SonarCloud Configuration - Frontend

# Project identification
sonar.projectKey=dsw2-practica01-frontend
sonar.projectName=DSW2 Practica 01 - Frontend
sonar.projectVersion=0.0.0

# Source code settings
sonar.sources=frontend/src
sonar.tests=frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

# Code coverage settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.exclusions=**/node_modules/**,**/dist/**

# TypeScript settings
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Code quality settings
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Security hotspots
sonar.securityreview.activated=true
