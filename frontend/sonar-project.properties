# ------------------------------
# SonarCloud project identifiers
# Reemplaza estos valores solo si tu organización cambia
# ------------------------------
sonar.projectKey=dsw2-practica01-frontend
sonar.host.url=https://sonarcloud.io

# ------------------------------
# Información del proyecto
# ------------------------------
sonar.projectName=DSW-01 - Frontend
sonar.projectVersion=0.0.0
sonar.sourceEncoding=UTF-8

# ------------------------------
# Fuentes y pruebas
# ------------------------------
sonar.sources=src
sonar.tests=src

# Marca las pruebas frontend
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.cy.ts

# Excluye generados y dependencias
sonar.exclusions=**/target/**,**/node_modules/**,**/.angular/**,**/dist/**,**/coverage/**

# ------------------------------
# Frontend (TypeScript)
# Ajusta la ruta según tu salida real de coverage
# ------------------------------
sonar.javascript.lcov.reportPaths=coverage/lcov.info,coverage/**/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
